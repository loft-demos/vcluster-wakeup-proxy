# Optional Secret for direct watcher -> vCluster Platform wake requests.
# Uncomment and replace the placeholder token if you want the watcher to call the
# platform API directly via WATCH_WAKE_UPSTREAM_BASE instead of going through cmd/proxy.
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: vcluster-platform-token
#   namespace: argocd
# type: Opaque
# stringData:
#   token: "<replace-with-platform-api-token>"
# ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcluster-gitops-watcher
  namespace: argocd
  labels:
    app.kubernetes.io/name: vcluster-gitops-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcluster-gitops-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcluster-gitops-watcher
    spec:
      serviceAccountName: vcluster-gitops-watcher
      containers:
        - name: watcher
          image: ghcr.io/your-org/vcluster-gitops-watcher:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ARGOCD_NAMESPACE
              value: "argocd"
            - name: ARGOCD_APPLICATION_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAME_TEMPLATE
              value: "loft-{project}-vcluster-{virtualcluster}"
            - name: WATCH_POLL_INTERVAL
              value: "2s"
            - name: WATCH_PROJECT_NAMESPACE_PREFIXES
              value: "p-,loft-p-"
            - name: WATCH_PATCH_APPLICATION_HEALTH
              value: "true"
            # Optional: wake sleeping destinations when Argo sets Application.operation.sync
            # or when the app moves to a newly observed OutOfSync revision.
            # Point this either at the vCluster Platform API directly or at cmd/proxy if you
            # want to reuse its tolerant 502/504 wake handling.
            # - name: WATCH_WAKE_UPSTREAM_BASE
            #   value: "https://platform.example.com"
            # - name: WATCH_WAKE_TOKEN_PATH
            #   value: "/var/run/secrets/platform/token"
            # - name: WATCH_WAKE_TIMEOUT
            #   value: "10s"
            # - name: WATCH_WAKE_RETRY_INTERVAL
            #   value: "30s"
            # Optional: after a successful wake request, patch
            # status.sleepModeConfig.status.lastActivity on the matching
            # VirtualClusterInstance to help clear stale sleeping UI state.
            # Requires the VCI status patch RBAC from deploy/watcher-rbac.yaml.
            # - name: WATCH_UPDATE_VCI_LAST_ACTIVITY_ON_WAKE
            #   value: "true"
          # Uncomment when using WATCH_WAKE_TOKEN_PATH with the example Secret above.
          # volumeMounts:
          #   - name: platform-token
          #     mountPath: /var/run/secrets/platform
          #     readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      # Uncomment when using WATCH_WAKE_TOKEN_PATH with the example Secret above.
      # volumes:
      #   - name: platform-token
      #     secret:
      #       secretName: vcluster-platform-token
      #       items:
      #         - key: token
      #           path: token
