apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcluster-wakeup-watcher
  namespace: argocd
  labels:
    app.kubernetes.io/name: vcluster-wakeup-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcluster-wakeup-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcluster-wakeup-watcher
    spec:
      serviceAccountName: vcluster-wakeup-watcher
      containers:
        - name: watcher
          image: ghcr.io/your-org/vcluster-wakeup-watcher:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ARGOCD_NAMESPACE
              value: "argocd"
            - name: ARGOCD_APPLICATION_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAME_TEMPLATE
              value: "loft-{project}-vcluster-{virtualcluster}"
            - name: WATCH_POLL_INTERVAL
              value: "15s"
            - name: WATCH_PROJECT_NAMESPACE_PREFIXES
              value: "p-,loft-p-"
            - name: WATCH_APPLICATION_PROJECT_LABEL
              value: "vclusterProjectId"
            - name: WATCH_APPLICATION_NAME_LABEL
              value: "vclusterName"
            - name: WATCH_PATCH_APPLICATION_HEALTH
              value: "false"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
