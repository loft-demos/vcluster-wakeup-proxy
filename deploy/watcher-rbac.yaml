apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcluster-gitops-watcher
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-gitops-watcher-vci-read
rules:
  - apiGroups: ["management.loft.sh"]
    resources: ["virtualclusterinstances"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kargo.akuity.io"]
    resources: ["promotions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-gitops-watcher-vci-read
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-gitops-watcher-vci-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-gitops-watcher-vci-status-patch
rules:
  - apiGroups: ["management.loft.sh"]
    resources: ["virtualclusterinstances/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-gitops-watcher-vci-status-patch
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-gitops-watcher-vci-status-patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcluster-gitops-watcher-argocd-write
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcluster-gitops-watcher-argocd-write
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vcluster-gitops-watcher-argocd-write
